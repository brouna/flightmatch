version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: flightmatch
      POSTGRES_PASSWORD: flightmatch
      POSTGRES_DB: flightmatch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flightmatch"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  test_postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: flightmatch_test
      POSTGRES_PASSWORD: flightmatch_test
      POSTGRES_DB: flightmatch_test
    ports:
      - "5433:5432"

volumes:
  postgres_data:
